# NemoClaw + NAT Evaluation Config WITH Phoenix Tracing
#
# Same as nemoclaw-eval.yml but also sends traces to Phoenix for
# visual inspection alongside numeric eval scores.
#
# Prerequisites:
#   1. NemoClaw sandbox running with Hermes agent (port 8642)
#   2. NVIDIA_API_KEY set for judge LLM
#   3. NEMOCLAW_API_KEY set to the Hermes sandbox bearer token
#   4. Phoenix running locally (port 6006)
#
# Usage:
#   nat eval --config_file eval-configs/nemoclaw-eval-phoenix.yml

llms:
  nemoclaw_agent:
    _type: nim
    model_name: hermes
    base_url: ${NEMOCLAW_SANDBOX_URL:-http://localhost:8642/v1}
    api_key: ${NEMOCLAW_API_KEY:-placeholder}
    temperature: 0.0
    max_tokens: 2048
    chat_template_kwargs:
      enable_thinking: false

  judge_llm:
    _type: nim
    model_name: nvidia/llama-3.1-nemotron-ultra-253b-v1
    max_tokens: 8
    chat_template_kwargs:
      enable_thinking: false

  trajectory_judge:
    _type: nim
    model_name: nvidia/llama-3.1-nemotron-ultra-253b-v1
    temperature: 0.0
    max_tokens: 1024
    chat_template_kwargs:
      enable_thinking: false

# chat_completion is a simple passthrough — Hermes has its own agent loop internally.
# See README Architecture section for why we don't use react_agent here.
workflow:
  _type: chat_completion
  llm_name: nemoclaw_agent

general:
  telemetry:
    logging:
      console:
        _type: console
        level: INFO
      file:
        _type: file
        path: ./eval-results/eval-telemetry.log
        level: DEBUG
    tracing:
      phoenix:
        _type: phoenix
        endpoint: ${PHOENIX_ENDPOINT:-http://localhost:6006/v1/traces}
        project: nemoclaw-eval

eval:
  general:
    max_concurrency: 1
    output:
      dir: ./eval-results/
      cleanup: false
    dataset:
      _type: json
      file_path: eval-datasets/combined.json
    profiler:
      workflow_runtime_forecast: true
      compute_llm_metrics: true
      csv_exclude_io_text: false
      bottleneck_analysis:
        enable_nested_stack: true
      concurrency_spike_analysis:
        enable: true
        spike_threshold: 3

  evaluators:
    accuracy:
      _type: ragas
      metric: AnswerAccuracy
      llm_name: judge_llm
    groundedness:
      _type: ragas
      metric: ResponseGroundedness
      llm_name: judge_llm
    trajectory:
      _type: trajectory
      llm_name: trajectory_judge
