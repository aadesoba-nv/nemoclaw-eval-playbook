# NemoClaw + NAT Evaluation Config
#
# Runs NAT eval against a NemoClaw Hermes sandbox.
# The Hermes API (OpenAI-compatible) is treated as the LLM backend.
# NAT sends eval dataset questions → Hermes agent processes them → NAT scores responses.
#
# Prerequisites:
#   1. NemoClaw sandbox running with Hermes agent (port 8642)
#   2. NVIDIA_API_KEY set for judge LLM (build.nvidia.com)
#   3. NEMOCLAW_API_KEY set to the Hermes sandbox bearer token (API_SERVER_KEY)
#
# Usage:
#   nat eval --config_file eval-configs/nemoclaw-eval.yml

llms:
  # The NemoClaw sandbox Hermes agent — exposed as OpenAI-compatible API.
  # NOTE: This is NOT a bare LLM. Requests go through the full Hermes agent
  # loop (reasoning, tools, memory) before returning a response.
  nemoclaw_agent:
    _type: nim
    model_name: hermes
    base_url: ${NEMOCLAW_SANDBOX_URL:-http://localhost:8642/v1}
    api_key: ${NEMOCLAW_API_KEY:-placeholder}
    temperature: 0.0
    max_tokens: 2048
    chat_template_kwargs:
      enable_thinking: false

  # Judge LLM for scoring eval responses — runs on NVIDIA endpoints.
  # Uses NVIDIA_API_KEY from environment.
  judge_llm:
    _type: nim
    model_name: nvidia/llama-3.1-nemotron-ultra-253b-v1
    max_tokens: 8
    chat_template_kwargs:
      enable_thinking: false

  # Trajectory judge needs more tokens for reasoning about agent paths.
  trajectory_judge:
    _type: nim
    model_name: nvidia/llama-3.1-nemotron-ultra-253b-v1
    temperature: 0.0
    max_tokens: 1024
    chat_template_kwargs:
      enable_thinking: false

# No tools — the NemoClaw agent has its own tools internally.
# chat_completion is a simple passthrough: sends the prompt, returns the response.
# This avoids the react_agent requirement for tools (NAT 1.5+).
workflow:
  _type: chat_completion
  llm_name: nemoclaw_agent

general:
  telemetry:
    logging:
      console:
        _type: console
        level: INFO
      file:
        _type: file
        path: ./eval-results/eval-telemetry.log
        level: DEBUG

eval:
  general:
    max_concurrency: 1
    output:
      dir: ./eval-results/
      cleanup: false
    dataset:
      _type: json
      file_path: eval-datasets/combined.json
    profiler:
      token_uniqueness_forecast: false
      workflow_runtime_forecast: true
      compute_llm_metrics: true
      csv_exclude_io_text: false
      bottleneck_analysis:
        enable_nested_stack: true

  evaluators:
    accuracy:
      _type: ragas
      metric: AnswerAccuracy
      llm_name: judge_llm
    groundedness:
      _type: ragas
      metric: ResponseGroundedness
      llm_name: judge_llm
    trajectory:
      _type: trajectory
      llm_name: trajectory_judge
