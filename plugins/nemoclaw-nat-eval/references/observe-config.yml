#
# NAT observe config — single prompt with Phoenix tracing.
#
# Usage:
#   nat run --config_file references/observe-config.yml \
#           --input "What security controls does this sandbox have?"

llms:
  nemoclaw_agent:
    _type: nim
    model_name: hermes
    base_url: ${NEMOCLAW_SANDBOX_URL:-http://localhost:8642/v1}
    api_key: ${NEMOCLAW_API_KEY:-placeholder}
    temperature: 0.0
    max_tokens: 2048
    chat_template_kwargs:
      enable_thinking: false

workflow:
  _type: chat_completion
  llm_name: nemoclaw_agent

general:
  telemetry:
    logging:
      console:
        _type: console
        level: INFO
    tracing:
      phoenix:
        _type: phoenix
        endpoint: ${PHOENIX_ENDPOINT:-http://localhost:6006/v1/traces}
        project: nemoclaw-observe
