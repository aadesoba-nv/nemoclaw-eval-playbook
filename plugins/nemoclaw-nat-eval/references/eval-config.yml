#
# NAT evaluation config targeting a NemoClaw Hermes sandbox.
#
# Environment variables:
#   NEMOCLAW_SANDBOX_URL  — Hermes API (default: http://localhost:8642/v1)
#   NEMOCLAW_API_KEY      — Hermes bearer token (API_SERVER_KEY)
#   NVIDIA_API_KEY        — NVIDIA endpoints key for judge LLM
#
# Usage:
#   nat eval --config_file references/eval-config.yml

llms:
  nemoclaw_agent:
    _type: nim
    model_name: hermes
    base_url: ${NEMOCLAW_SANDBOX_URL:-http://localhost:8642/v1}
    api_key: ${NEMOCLAW_API_KEY:-placeholder}
    temperature: 0.0
    max_tokens: 2048
    chat_template_kwargs:
      enable_thinking: false

  judge_llm:
    _type: nim
    model_name: meta/llama-3.3-70b-instruct
    max_tokens: 8
    chat_template_kwargs:
      enable_thinking: false

  trajectory_judge:
    _type: nim
    model_name: meta/llama-3.3-70b-instruct
    temperature: 0.0
    max_tokens: 1024
    chat_template_kwargs:
      enable_thinking: false

workflow:
  _type: chat_completion
  llm_name: nemoclaw_agent

general:
  telemetry:
    logging:
      console:
        _type: console
        level: INFO
      file:
        _type: file
        path: ./eval-results/eval-telemetry.log
        level: DEBUG

eval:
  general:
    max_concurrency: 1
    output:
      dir: ./eval-results/
      cleanup: false
    dataset:
      _type: json
      file_path: eval-datasets/combined.json
    profiler:
      workflow_runtime_forecast: true
      compute_llm_metrics: true
      csv_exclude_io_text: false
      bottleneck_analysis:
        enable_nested_stack: true

  evaluators:
    accuracy:
      _type: ragas
      metric: AnswerAccuracy
      llm_name: judge_llm
    groundedness:
      _type: ragas
      metric: ResponseGroundedness
      llm_name: judge_llm
    trajectory:
      _type: trajectory
      llm_name: trajectory_judge
